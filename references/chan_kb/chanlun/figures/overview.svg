<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="840" viewBox="0 0 1200 840">
  <title>Chanlun Visual Card Overview</title>
  <desc>Portable abstract comparison card for agent-stock Chanlun analysis. Use with rules.md; not for automatic chart recognition.</desc>
  <rect width="1200" height="840" fill="#ffffff"/>
  <style>
    .title{font:700 28px Arial,sans-serif;fill:#111827}
    .label{font:700 17px Arial,sans-serif;fill:#111827}
    .small{font:13px Arial,sans-serif;fill:#374151}
    .box{fill:#f9fafb;stroke:#d1d5db;stroke-width:2;rx:12}
    .line{stroke:#111827;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .blue{stroke:#2563eb}
    .red{stroke:#dc2626}
    .green{stroke:#16a34a}
    .zone{fill:#dbeafe;stroke:#2563eb;stroke-width:2;fill-opacity:.72}
  </style>
  <text x="36" y="48" class="title">Chanlun Visual Card Overview</text>
  <text x="36" y="78" class="small">Portable abstract cards for structure comparison. Use with ../rules.md and do not treat as automatic chart recognition.</text>

  <rect x="40" y="115" width="340" height="200" class="box"/>
  <text x="60" y="145" class="label">Fractal + Stroke</text>
  <polyline points="70,250 115,190 160,230 210,165 260,218 320,175" class="line"/>
  <circle cx="70" cy="250" r="6" fill="#2563eb"/>
  <circle cx="320" cy="175" r="6" fill="#dc2626"/>
  <line x1="70" y1="250" x2="320" y2="175" class="line green"/>
  <text x="60" y="292" class="small">opposite fractals plus enough processed bars</text>

  <rect x="430" y="115" width="340" height="200" class="box"/>
  <text x="450" y="145" class="label">Segment Break</text>
  <polyline points="460,245 515,175 575,230 640,160 705,235 750,205" class="line"/>
  <polyline points="640,160 705,235 750,205" class="line red"/>
  <text x="450" y="292" class="small">requires characteristic sequence evidence</text>

  <rect x="820" y="115" width="340" height="200" class="box"/>
  <text x="840" y="145" class="label">Center ZG/ZD</text>
  <rect x="930" y="200" width="130" height="46" class="zone"/>
  <polyline points="850,260 900,180 950,240 1005,190 1060,245 1120,205" class="line"/>
  <text x="840" y="292" class="small">three same-level moves overlap: ZD &lt;= ZG</text>

  <rect x="40" y="365" width="340" height="200" class="box"/>
  <text x="60" y="395" class="label">Buy/Sell Points</text>
  <rect x="175" y="455" width="80" height="35" class="zone"/>
  <polyline points="70,515 120,450 170,500 225,435 280,475 335,425" class="line"/>
  <circle cx="170" cy="500" r="7" fill="#16a34a"/>
  <circle cx="280" cy="475" r="7" fill="#16a34a"/>
  <text x="60" y="542" class="small">buy point type must include level and invalidation</text>

  <rect x="430" y="365" width="340" height="200" class="box"/>
  <text x="450" y="395" class="label">Divergence</text>
  <polyline points="460,500 520,430 580,485 650,410 720,460" class="line"/>
  <rect x="500" y="520" width="20" height="35" fill="#2563eb"/>
  <rect x="530" y="505" width="20" height="50" fill="#2563eb"/>
  <rect x="650" y="530" width="20" height="25" fill="#93c5fd"/>
  <rect x="680" y="520" width="20" height="35" fill="#93c5fd"/>
  <text x="450" y="542" class="small">MACD area is auxiliary, not the primary rule</text>

  <rect x="820" y="365" width="340" height="200" class="box"/>
  <text x="840" y="395" class="label">Interval Nesting</text>
  <polyline points="850,515 895,450 940,500 985,430" class="line"/>
  <polyline points="1010,510 1040,470 1070,495 1105,455" class="line blue"/>
  <circle cx="1105" cy="455" r="7" fill="#16a34a"/>
  <text x="840" y="542" class="small">large level direction, small level timing</text>

  <rect x="40" y="620" width="1120" height="150" class="box"/>
  <text x="65" y="655" class="label">Use Sequence</text>
  <text x="65" y="690" class="small">1. name level -> 2. normalize bars -> 3. find fractals/strokes/segments -> 4. locate center -> 5. check divergence/buy-sell point -> 6. fuse money/sector/news -> 7. output invalidation.</text>
  <text x="65" y="725" class="small">If data is summarized or insufficient, lower confidence and state what cannot be confirmed.</text>
</svg>
