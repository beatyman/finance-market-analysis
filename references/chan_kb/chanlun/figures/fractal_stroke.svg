<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560">
  <title>Chanlun Fractal And Stroke Reference</title>
  <desc>Abstract comparison card for fractals, inclusion normalization, and strokes. Confirm from OHLC sequence, not from this drawing alone.</desc>
  <rect width="960" height="560" fill="#ffffff"/>
  <style>
    .title{font:700 24px Arial,sans-serif;fill:#111827}
    .label{font:16px Arial,sans-serif;fill:#111827}
    .small{font:13px Arial,sans-serif;fill:#374151}
    .bar{stroke:#111827;stroke-width:4;stroke-linecap:round}
    .up{stroke:#2563eb}
    .down{stroke:#dc2626}
    .line{stroke:#111827;stroke-width:3;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .hint{stroke:#9ca3af;stroke-width:2;stroke-dasharray:6 6}
    .box{fill:#f9fafb;stroke:#d1d5db;stroke-width:2;rx:10}
  </style>
  <text x="32" y="44" class="title">Fractal And Stroke Reference</text>
  <text x="32" y="74" class="small">Use as an abstract comparison card. Confirm from OHLC sequence, not from this drawing alone.</text>

  <rect x="32" y="105" width="270" height="190" class="box"/>
  <text x="56" y="136" class="label">Top fractal</text>
  <line x1="105" y1="230" x2="105" y2="165" class="bar"/>
  <line x1="165" y1="238" x2="165" y2="135" class="bar down"/>
  <line x1="225" y1="232" x2="225" y2="175" class="bar"/>
  <polyline points="105,165 165,135 225,175" class="line down"/>
  <polyline points="105,230 165,238 225,232" class="line"/>
  <text x="58" y="270" class="small">middle bar has highest high and higher low</text>

  <rect x="345" y="105" width="270" height="190" class="box"/>
  <text x="369" y="136" class="label">Bottom fractal</text>
  <line x1="418" y1="165" x2="418" y2="230" class="bar"/>
  <line x1="478" y1="145" x2="478" y2="250" class="bar up"/>
  <line x1="538" y1="170" x2="538" y2="235" class="bar"/>
  <polyline points="418,165 478,145 538,170" class="line"/>
  <polyline points="418,230 478,250 538,235" class="line up"/>
  <text x="371" y="270" class="small">middle bar has lowest low and lower high</text>

  <rect x="658" y="105" width="270" height="190" class="box"/>
  <text x="682" y="136" class="label">Inclusion normalization</text>
  <rect x="710" y="160" width="44" height="88" fill="none" stroke="#111827" stroke-width="3"/>
  <rect x="742" y="180" width="28" height="46" fill="none" stroke="#dc2626" stroke-width="3"/>
  <path d="M795 205 H845" class="hint"/>
  <path d="M835 195 L850 205 L835 215" class="hint"/>
  <line x1="875" y1="248" x2="875" y2="158" class="bar up"/>
  <text x="684" y="270" class="small">merge contained bars before fractal detection</text>

  <rect x="120" y="330" width="720" height="170" class="box"/>
  <text x="145" y="362" class="label">Valid stroke: opposite fractals with enough processed bars</text>
  <polyline points="160,450 220,405 282,438 340,375 405,420 470,350 535,402 600,330 665,390 735,360" class="line"/>
  <circle cx="160" cy="450" r="7" fill="#2563eb"/>
  <circle cx="735" cy="360" r="7" fill="#dc2626"/>
  <line x1="160" y1="450" x2="735" y2="360" stroke="#059669" stroke-width="5" stroke-linecap="round"/>
  <text x="142" y="480" class="small">bottom fractal</text>
  <text x="694" y="336" class="small">top fractal</text>
  <text x="145" y="392" class="small">Practical guard: if there are fewer than 5 processed K bars, do not claim a confirmed stroke.</text>
</svg>
