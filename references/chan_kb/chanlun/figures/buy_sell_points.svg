<svg xmlns="http://www.w3.org/2000/svg" width="960" height="620" viewBox="0 0 960 620">
  <title>Chanlun Buy Sell Points Reference</title>
  <desc>Abstract comparison card for first, second, and third buy/sell points. Use only with level, structure basis, and invalidation.</desc>
  <rect width="960" height="620" fill="#ffffff"/>
  <style>
    .title{font:700 24px Arial,sans-serif;fill:#111827}
    .label{font:16px Arial,sans-serif;fill:#111827}
    .small{font:13px Arial,sans-serif;fill:#374151}
    .line{stroke:#111827;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .zone{fill:#e0f2fe;stroke:#0284c7;stroke-width:2;fill-opacity:.72}
    .buy{fill:#16a34a}
    .sell{fill:#dc2626}
    .box{fill:#f9fafb;stroke:#d1d5db;stroke-width:2;rx:10}
  </style>
  <text x="32" y="44" class="title">Buy/Sell Point Reference</text>
  <text x="32" y="74" class="small">This card shows relative positions. The actual level must be named before use.</text>

  <rect x="50" y="110" width="860" height="210" class="box"/>
  <text x="78" y="142" class="label">Buy side: divergence, retest, third-buy pullback</text>
  <rect x="360" y="185" width="210" height="55" class="zone"/>
  <polyline points="95,155 175,250 260,180 345,270 450,210 560,235 660,160 760,205 850,150" class="line"/>
  <circle cx="345" cy="270" r="9" class="buy"/>
  <circle cx="560" cy="235" r="9" class="buy"/>
  <circle cx="760" cy="205" r="9" class="buy"/>
  <text x="315" y="295" class="small">1st buy</text>
  <text x="530" y="260" class="small">2nd buy</text>
  <text x="725" y="230" class="small">3rd buy</text>
  <text x="372" y="180" class="small">old center</text>

  <rect x="50" y="365" width="860" height="210" class="box"/>
  <text x="78" y="397" class="label">Sell side: top divergence, rebound, third-sell pullback</text>
  <rect x="390" y="455" width="210" height="55" class="zone"/>
  <polyline points="95,520 175,430 260,500 345,405 465,470 590,445 680,545 760,500 850,560" class="line"/>
  <circle cx="345" cy="405" r="9" class="sell"/>
  <circle cx="590" cy="445" r="9" class="sell"/>
  <circle cx="760" cy="500" r="9" class="sell"/>
  <text x="315" y="390" class="small">1st sell</text>
  <text x="560" y="430" class="small">2nd sell</text>
  <text x="725" y="485" class="small">3rd sell</text>
  <text x="402" y="450" class="small">old center</text>
</svg>
