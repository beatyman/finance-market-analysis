<svg xmlns="http://www.w3.org/2000/svg" width="960" height="560" viewBox="0 0 960 560">
  <title>Chanlun Divergence MACD Reference</title>
  <desc>Abstract comparison card for divergence and MACD auxiliary force comparison. MACD is not the primary Chanlun rule.</desc>
  <rect width="960" height="560" fill="#ffffff"/>
  <style>
    .title{font:700 24px Arial,sans-serif;fill:#111827}
    .label{font:16px Arial,sans-serif;fill:#111827}
    .small{font:13px Arial,sans-serif;fill:#374151}
    .price{stroke:#111827;stroke-width:4;fill:none;stroke-linecap:round;stroke-linejoin:round}
    .macd1{fill:#2563eb}
    .macd2{fill:#93c5fd}
    .warn{fill:#dc2626}
    .box{fill:#f9fafb;stroke:#d1d5db;stroke-width:2;rx:10}
    .dash{stroke:#9ca3af;stroke-width:2;stroke-dasharray:6 6}
  </style>
  <text x="32" y="44" class="title">Divergence And MACD Auxiliary Check</text>
  <text x="32" y="74" class="small">MACD helps compare force. It does not replace center/trend qualification.</text>

  <rect x="60" y="115" width="840" height="360" class="box"/>
  <polyline points="110,340 220,230 330,300 450,180 565,260 700,155 830,235" class="price"/>
  <line x1="110" y1="350" x2="850" y2="350" class="dash"/>
  <text x="150" y="210" class="small">move A</text>
  <text x="470" y="160" class="small">move B</text>
  <text x="690" y="135" class="small">price makes new high</text>
  <circle cx="700" cy="155" r="8" class="warn"/>

  <rect x="150" y="380" width="30" height="55" class="macd1"/>
  <rect x="190" y="365" width="30" height="70" class="macd1"/>
  <rect x="230" y="392" width="30" height="43" class="macd1"/>
  <rect x="505" y="400" width="30" height="35" class="macd2"/>
  <rect x="545" y="388" width="30" height="47" class="macd2"/>
  <rect x="585" y="405" width="30" height="30" class="macd2"/>
  <text x="142" y="455" class="small">larger area</text>
  <text x="497" y="455" class="small">smaller area</text>
  <text x="650" y="405" class="label">Possible top divergence</text>
  <text x="650" y="430" class="small">Only valid if same-level trend conditions are met.</text>
</svg>
